name: Discord Release Notification

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send release announcement to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          jq -n \
            --arg name "$RELEASE_NAME" \
            --arg tag "$RELEASE_TAG" \
            --arg url "$RELEASE_URL" \
            --arg body "$(echo "$RELEASE_BODY" | head -c 3000)" \
            '{
              "username": "AgeOS Releases",
              "avatar_url": "https://ageos-labs.com/logo.png",
              "embeds": [
                {
                  "title": ("🚀 " + $name),
                  "url": $url,
                  "description": "A new AgeOS release is now available.",
                  "fields": [
                    {
                      "name": "Version",
                      "value": $tag,
                      "inline": true
                    },
                    {
                      "name": "Download",
                      "value": ("[GitHub Release](" + $url + ")"),
                      "inline": true
                    },
                    {
                      "name": "What's New",
                      "value": (
                        if ($body | length) > 0
                        then $body
                        else "See the release page for details."
                        end
                      )
                    }
                  ],
                  "footer": {
                    "text": "AgeOS • One-click agent sandboxing and local LLM serving"
                  },
                  "timestamp": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'"
                }
              ]
            }' > payload.json

          curl \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "$DISCORD_WEBHOOK"